<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
</head>
<body>

  <!-- 左側圖片（固定，滿版高度） -->
  <div class="side-panel side-left">
    <img src="{{ '/assets/images/side-left-1.PNG' | relative_url }}" alt="">
  </div>

  <!-- 右側圖片（固定，滿版高度） -->
  <div class="side-panel side-right">
    <img src="{{ '/assets/images/side-right-1.PNG' | relative_url }}" alt="">
  </div>

  <!-- 橫幅圖片 -->
  <div class="banner-image">
    <img src="{{ '/assets/images/banner.png' | relative_url }}" alt="深海工作室 Banner">
  </div>

  <!-- 主內容區 -->
  <div class="site-wrapper">

    <header class="site-header">
      <h1>{{ site.title }}</h1>
      <p class="tagline">{{ site.description }}</p>
    </header>

    <main class="site-content">
      {{ content }}
    </main>

    <footer class="site-footer">
      <p>© 2026 深海工作室 DeepSea Studio. All rights reserved.</p>
    </footer>

  </div>

</body>
</html>
