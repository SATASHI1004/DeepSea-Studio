<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>

  <!-- SEO & OG Meta -->
  <meta name="description" content="{{ page.description | default: site.description | strip_html | truncatewords: 50 }}">
  <meta name="author" content="奧蘿拉 / DeepSea Studio">
  <meta property="og:title" content="{{ page.title | default: site.title }}">
  <meta property="og:description" content="{{ page.description | default: site.description | strip_html | truncatewords: 50 }}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
  <meta property="og:image" content="{{ '/assets/images/banner.png' | absolute_url }}">
  <meta property="og:site_name" content="{{ site.title }}">
  <meta property="og:locale" content="zh_TW">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ page.title | default: site.title }}">
  <meta name="twitter:description" content="{{ page.description | default: site.description | strip_html | truncatewords: 50 }}">
  <meta name="twitter:image" content="{{ '/assets/images/banner.png' | absolute_url }}">

  <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
</head>
<body>

  <!-- 固定背景層（GPU 加速，取代 background-attachment: fixed） -->
  <div class="bg-fixed"></div>

  <!-- 左側圖片（固定，滿版高度） -->
  <div class="side-panel side-left">
    <img src="{{ '/assets/images/side-left-1.PNG' | relative_url }}" alt="" loading="lazy">
  </div>

  <!-- 右側圖片（固定，滿版高度） -->
  <div class="side-panel side-right">
    <img src="{{ '/assets/images/side-right-1.PNG' | relative_url }}" alt="" loading="lazy">
  </div>

  <!-- 橫幅圖片 -->
  <div class="banner-image">
    <img src="{{ '/assets/images/banner.png' | relative_url }}" alt="深海工作室 Banner">
  </div>

  <!-- 主內容區 -->
  <div class="site-wrapper">

    <header class="site-header">
      <h1>{{ site.title }}</h1>
      <p class="tagline">{{ site.description }}</p>
    </header>

    <nav class="main-nav">
      <a href="{{ '/' | relative_url }}">🏠 首頁</a>
      <a href="{{ '/commissions' | relative_url }}">🎨 委託資訊</a>
      <a href="{{ '/business' | relative_url }}">💼 商業合作</a>
      <a href="{{ '/r18' | relative_url }}">🔞 R18</a>
      <a href="{{ '/gallery' | relative_url }}">🖼️ 作品集</a>
      <a href="{{ '/queue' | relative_url }}">📊 排隊看板</a>
      <a href="{{ '/faq' | relative_url }}">❓ FAQ</a>
    </nav>

    <main class="site-content">
      {{ content }}
    </main>

    <footer class="site-footer">
      <div class="footer-social">
        <a href="#" class="social-link" title="Twitter / X">🐦</a>
        <a href="#" class="social-link" title="Pixiv">🎨</a>
        <a href="#" class="social-link" title="Instagram">📷</a>
        <a href="#" class="social-link" title="Facebook">📘</a>
        <a href="mailto:" class="social-link" title="Email">✉️</a>
      </div>
      <p>© 2026 深海工作室 DeepSea Studio. All rights reserved.</p>
    </footer>

  </div>

  <!-- 回到頂部按鈕 -->
  <button class="back-to-top" onclick="window.scrollTo({top:0,behavior:'smooth'})" aria-label="回到頂部">↑</button>

  <!-- Lightbox JS -->
  <script>
  (function() {
    var allImages = [];
    var currentIdx = 0;

    function collectImages() {
      allImages = Array.prototype.slice.call(
        document.querySelectorAll('.gallery-grid img, .hero-gallery img, .style-preview')
      );
    }

    function showLightbox(idx) {
      var old = document.querySelector('.lightbox-overlay');
      if (old) old.remove();

      currentIdx = idx;
      var img = allImages[idx];
      var overlay = document.createElement('div');
      overlay.className = 'lightbox-overlay';
      overlay.innerHTML =
        '<span class="lightbox-close">&times;</span>' +
        (allImages.length > 1 ? '<span class="lightbox-nav lightbox-prev">‹</span><span class="lightbox-nav lightbox-next">›</span>' : '') +
        '<img src="' + img.src + '" alt="' + (img.alt || '') + '">';

      document.body.appendChild(overlay);
      requestAnimationFrame(function() { overlay.classList.add('active'); });

      overlay.addEventListener('click', function(ev) {
        if (ev.target.classList.contains('lightbox-prev')) {
          showLightbox((currentIdx - 1 + allImages.length) % allImages.length);
        } else if (ev.target.classList.contains('lightbox-next')) {
          showLightbox((currentIdx + 1) % allImages.length);
        } else if (!ev.target.matches('.lightbox-overlay img')) {
          overlay.classList.remove('active');
          setTimeout(function() { overlay.remove(); }, 250);
        }
      });
    }

    document.addEventListener('click', function(e) {
      var img = e.target;
      if (!img.matches('.gallery-grid img, .hero-gallery img, .style-preview')) return;
      collectImages();
      var idx = allImages.indexOf(img);
      if (idx === -1) idx = 0;
      showLightbox(idx);
    });

    document.addEventListener('keydown', function(e) {
      var overlay = document.querySelector('.lightbox-overlay');
      if (!overlay) return;
      if (e.key === 'Escape') {
        overlay.classList.remove('active');
        setTimeout(function() { overlay.remove(); }, 250);
      } else if (e.key === 'ArrowLeft') {
        showLightbox((currentIdx - 1 + allImages.length) % allImages.length);
      } else if (e.key === 'ArrowRight') {
        showLightbox((currentIdx + 1) % allImages.length);
      }
    });
  })();

  // 回到頂部按鈕顯示/隱藏
  (function() {
    var btn = document.querySelector('.back-to-top');
    window.addEventListener('scroll', function() {
      btn.classList.toggle('visible', window.scrollY > 400);
    });
  })();

  // 導航當前頁面高亮
  (function() {
    var path = window.location.pathname.replace(/\/$/, '');
    var links = document.querySelectorAll('nav.main-nav a');
    for (var i = 0; i < links.length; i++) {
      var href = links[i].getAttribute('href').replace(/\/$/, '');
      if (path === href || (href !== '/DeepSea-Studio' && path.indexOf(href) === 0)) {
        links[i].classList.add('active');
      }
    }
  })();

  // 手機版漢堡選單
  (function() {
    var nav = document.querySelector('nav.main-nav');
    if (!nav) return;
    var toggle = document.createElement('button');
    toggle.className = 'nav-toggle';
    toggle.setAttribute('aria-label', '選單');
    toggle.innerHTML = '☰';
    nav.parentNode.insertBefore(toggle, nav);
    toggle.addEventListener('click', function() {
      nav.classList.toggle('open');
      toggle.innerHTML = nav.classList.contains('open') ? '✕' : '☰';
    });
  })();

  // 圖片骨架屏載入
  (function() {
    var imgs = document.querySelectorAll('.gallery-grid img, .hero-gallery img');
    for (var i = 0; i < imgs.length; i++) {
      (function(img) {
        var wrap = document.createElement('div');
        wrap.className = 'skeleton-wrap';
        img.parentNode.insertBefore(wrap, img);
        wrap.appendChild(img);
        if (img.complete) {
          wrap.classList.add('loaded');
        } else {
          img.addEventListener('load', function() { wrap.classList.add('loaded'); });
          img.addEventListener('error', function() { wrap.classList.add('loaded'); });
        }
      })(imgs[i]);
    }
  })();

  // Gallery 分類篩選
  (function() {
    var filterWrap = document.querySelector('.gallery-filter');
    if (!filterWrap) return;
    var buttons = filterWrap.querySelectorAll('button');
    var sections = document.querySelectorAll('.gallery-section');
    for (var i = 0; i < buttons.length; i++) {
      (function(btn) {
        btn.addEventListener('click', function() {
          for (var j = 0; j < buttons.length; j++) buttons[j].classList.remove('active');
          btn.classList.add('active');
          var cat = btn.getAttribute('data-cat');
          for (var k = 0; k < sections.length; k++) {
            if (cat === 'all' || sections[k].getAttribute('data-cat') === cat) {
              sections[k].classList.remove('hidden');
            } else {
              sections[k].classList.add('hidden');
            }
          }
        });
      })(buttons[i]);
    }
  })();
  </script>

</body>
</html>
