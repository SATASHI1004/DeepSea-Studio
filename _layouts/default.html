<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
</head>
<body>

  <!-- 三欄式版面 -->
  <div class="page-layout">

    <!-- 左側圖片欄 -->
    <div class="side-column side-left">
      <div class="side-sticky">
        <img src="{{ '/assets/images/side-left-1.PNG' | relative_url }}" alt="">
      </div>
    </div>

    <!-- 主內容區 -->
    <div class="center-column">

      <!-- 橫幅圖片（全寬） -->
      <div class="banner-image">
        <img src="{{ '/assets/images/banner.png' | relative_url }}" alt="深海工作室 Banner">
      </div>

      <!-- 標題區 -->
      <header class="site-header">
        <h1>{{ site.title }}</h1>
        <p class="tagline">{{ site.description }}</p>
      </header>

      <!-- 頁面內容 -->
      <main class="site-content">
        {{ content }}
      </main>

      <!-- 自訂頁尾 -->
      <footer class="site-footer">
        <p>© 2026 深海工作室 DeepSea Studio. All rights reserved.</p>
      </footer>

    </div> <!-- /center-column -->

    <!-- 右側圖片欄 -->
    <div class="side-column side-right">
      <div class="side-sticky">
        <img src="{{ '/assets/images/side-right-1.PNG' | relative_url }}" alt="">
      </div>
    </div>

  </div>

</body>
</html>
